version: '3.8'

services:
  frontend:
    build:
      context: .. # Lùi ra 1 cấp (thư mục gốc) để lấy source code
      dockerfile: .devcontainer/Dockerfile.dev # Trỏ vào file Dockerfile nằm trong thư mục này
    ports:
      - "5173:5173"
    volumes:
      - ..:/app # Ánh xạ toàn bộ thư mục gốc vào /app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true